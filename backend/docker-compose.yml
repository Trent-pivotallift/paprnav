services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: paprnav_db
      POSTGRES_USER: paprnav_user
      POSTGRES_PASSWORD: paprnav_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paprnav_user -d paprnav_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://paprnav_user:paprnav_password@db:5432/paprnav_db
      PAPRNAV_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      PAPRNAV_ENV: local
      PAPRNAV_LOCAL_STORAGE_PATH: /app/.data
      PAPRNAV_MAX_UPLOAD_SIZE_BYTES: "104857600"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build:
      context: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://paprnav_user:paprnav_password@db:5432/paprnav_db
      PAPRNAV_ENV: local
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  seed:
    build:
      context: .
    command: python -m app.scripts.seed_dev
    environment:
      DATABASE_URL: postgresql+psycopg://paprnav_user:paprnav_password@db:5432/paprnav_db
      PAPRNAV_ENV: local
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  db_data:
